<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新增活動</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<div class="topbar">
  <div>
    <span class="eyebrow">Organizer Only</span>
    <h1>新增活動</h1>
  </div>
</div>

<div class="admin-wrap" id="app">
  <div class="loading">載入中…</div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="../assets/main.js"></script>
<script>
let currentProfile = null;

const formHtml = `
  <div class="panel">
    <p class="panel-title">基本資訊 <span class="tag">Auto ID</span></p>
    <div class="field">
      <label>活動代碼（自動產生，可自行修改）</label>
      <input id="id" placeholder="載入中…">
    </div>
    <div class="field">
      <label>活動名稱</label>
      <input id="title">
    </div>
    <div class="field">
      <label>活動天數</label>
      <select id="days"></select>
    </div>
    <div class="field">
      <label>地區</label>
      <input id="area" placeholder="例如 花蓮">
    </div>
    <div class="field">
      <label>日期文字（顯示用）</label>
      <input id="date_text" placeholder="例如 10/18(六)-10/19(日)">
    </div>
    <div class="field">
      <label>活動日期（yyyy-mm-dd，僅用來判斷是否過期）</label>
      <input id="event_date" type="date">
    </div>
    <div class="field">
      <label>價格</label>
      <input id="price" type="number" placeholder="2980">
    </div>
    <div class="field">
      <label>總名額</label>
      <input id="capacity" type="number" placeholder="20">
    </div>
    <div class="field">
      <label>候補功能</label>
      <select id="waitlist_status">
        <option value="">開放候補（預設）</option>
        <option value="closed">關閉候補</option>
      </select>
    </div>
  </div>

  <div class="panel">
    <p class="panel-title">封面圖片</p>
    <div class="field">
      <label>封面圖網址</label>
      <input id="cover_image" placeholder="https://... 或從下方圖庫點選">
    </div>
    <div class="cover-picker" id="coverPicker"></div>
    <button class="btn btn-ghost btn-block" id="reshuffleCoverBtn" style="margin-top:10px;">換一批</button>
  </div>

  <div class="panel">
    <p class="panel-title">行程與連結</p>
    <div class="field">
      <label>備註（顯示在詳情頁行程之上，可留空）</label>
      <textarea id="notes" placeholder="例如：請自備泳具、活動當天若下雨則順延一週"></textarea>
    </div>
    <div id="itineraryDaysWrap"></div>
    <div class="field">
      <label>YouTube 連結（可多行，每行：說明文字 網址）</label>
      <textarea id="youtube_links" placeholder="行前說明會 https://youtu.be/xxxx
去年花絮 https://youtu.be/yyyy"></textarea>
    </div>
    <div class="field">
      <label>Google Map 連結（可多行，每行：說明文字 網址）</label>
      <textarea id="map_links" placeholder="集合地點 https://maps.app.goo.gl/xxxx
午餐地點 https://maps.app.goo.gl/yyyy"></textarea>
    </div>
  </div>

  <div class="panel">
    <p class="panel-title">主辦資訊</p>
    <div class="field">
      <label>主辦人名稱</label>
      <input id="organizer_name">
    </div>
    <div class="field">
      <label>主辦人 LINE 加好友連結</label>
      <input id="organizer_line_url" placeholder="https://line.me/ti/p/xxxxxxx">
    </div>
    <div class="field">
      <label>常用主辦人</label>
      <div class="chip-row" id="organizerPresetList"></div>
      <button class="btn btn-ghost btn-block" id="savePresetBtn" style="margin-top:10px;">把上面填的名稱＋連結存成常用</button>
    </div>
    <div class="field">
      <label>揪團群組連結</label>
      <input id="group_url" placeholder="https://line.me/ti/g2/xxxxxxx">
    </div>
  </div>

  <button class="btn btn-primary btn-block" id="submitBtn">建立活動</button>
  <p id="msg" class="join-note"></p>
`;

const fieldIds = ["id","title","cover_image","area","date_text","event_date","price","capacity",
  "waitlist_status","notes","youtube_links","map_links","organizer_name","organizer_line_url","group_url"];

const MAX_DAYS = 10;
const CN_NUM = ["一","二","三","四","五","六","七","八","九","十"];
let dayTexts = Array(MAX_DAYS).fill("");

function initDaysSelect(){
  const sel = document.getElementById("days");
  sel.innerHTML = CN_NUM.map((cn,i) => `<option value="${i+1}">${cn}日遊</option>`).join("");
  sel.value = "1";
}

function renderDayFields(){
  const days = Number(document.getElementById("days").value) || 1;
  for(let i = days; i < MAX_DAYS; i++) dayTexts[i] = ""; // 天數變少時，把多出來的清掉
  const wrap = document.getElementById("itineraryDaysWrap");
  wrap.innerHTML = Array.from({length: days}, (_, i) => `
    <div class="field">
      <label>第 ${i+1} 天行程（換行就斷行，可用「文字|網址」插入 YouTube/Google Map 連結）</label>
      <textarea class="dayTextarea" data-day="${i+1}" placeholder="早上08:00集合出發
淡水漁人碼頭|https://youtu.be/xxxx
https://maps.app.goo.gl/xxxx">${dayTexts[i] || ""}</textarea>
    </div>
  `).join("");
  wrap.querySelectorAll(".dayTextarea").forEach(ta=>{
    ta.addEventListener("input", ()=>{ dayTexts[Number(ta.dataset.day)-1] = ta.value; });
  });
}

function resetDayFields(){
  dayTexts = Array(MAX_DAYS).fill("");
  document.getElementById("days").value = "1";
  renderDayFields();
}

async function renderCoverPicker(){
  const picker = document.getElementById("coverPicker");
  picker.innerHTML = `<span class="join-note">載入圖庫中…</span>`;
  try{
    const all = await fetchCoverImages();
    if(!all.length){ picker.innerHTML = `<span class="join-note">圖庫是空的（cover-image 分頁沒有圖片網址）</span>`; return; }
    const sample = pickRandom(all, 3);
    picker.innerHTML = sample.map(url => `<img class="cover-thumb" src="${url}" data-url="${url}">`).join("");
    picker.querySelectorAll(".cover-thumb").forEach(img=>{
      img.addEventListener("click", ()=>{
        document.getElementById("cover_image").value = img.dataset.url;
        picker.querySelectorAll(".cover-thumb").forEach(i=>i.classList.remove("selected"));
        img.classList.add("selected");
      });
    });
  }catch(e){
    picker.innerHTML = `<span class="join-note">圖庫載入失敗</span>`;
  }
}

async function renderOrganizerPresets(){
  const listEl = document.getElementById("organizerPresetList");
  listEl.innerHTML = `<span class="join-note">載入中…</span>`;
  try{
    const presets = await fetchOrganizerPresets();
    if(!presets.length){
      listEl.innerHTML = `<span class="join-note">還沒有常用主辦人，填好上面欄位後可以按下方按鈕新增</span>`;
      return;
    }
    listEl.innerHTML = presets.map((p,i) => `<span class="chip-link presetChip" data-i="${i}" style="cursor:pointer;">👤 ${p.name || p.lineUrl}</span>`).join("");
    listEl.querySelectorAll(".presetChip").forEach(chip=>{
      chip.addEventListener("click", ()=>{
        const p = presets[Number(chip.dataset.i)];
        document.getElementById("organizer_name").value = p.name;
        document.getElementById("organizer_line_url").value = p.lineUrl;
      });
    });
  }catch(e){
    listEl.innerHTML = `<span class="join-note">載入失敗</span>`;
  }
}

function renderContent(profile){
  currentProfile = profile;
  const app = document.getElementById("app");
  app.innerHTML = formHtml;

  fetchNextActivityId().then(id => { document.getElementById("id").value = id; }).catch(()=>{});
  renderCoverPicker();
  renderOrganizerPresets();
  initDaysSelect();
  renderDayFields();
  document.getElementById("days").addEventListener("change", renderDayFields);
  document.getElementById("reshuffleCoverBtn").addEventListener("click", renderCoverPicker);

  document.getElementById("savePresetBtn").addEventListener("click", async ()=>{
    const name = document.getElementById("organizer_name").value.trim();
    const lineUrl = document.getElementById("organizer_line_url").value.trim();
    if(!name && !lineUrl){ alert("請先填主辦人名稱或連結再存成常用"); return; }
    try{
      await addOrganizerPreset(name, lineUrl, currentProfile.userId);
      renderOrganizerPresets();
    }catch(e){
      alert("新增常用失敗：" + e.message);
    }
  });

  document.getElementById("submitBtn").addEventListener("click", async ()=>{
    const msg = document.getElementById("msg");
    const fields = {};
    fieldIds.forEach(id => fields[id] = document.getElementById(id).value.trim());
    fields.days = document.getElementById("days").value;
    for(let i = 0; i < MAX_DAYS; i++){
      fields["itinerary_day" + (i+1)] = dayTexts[i] || "";
    }

    if(!fields.id || !fields.title){
      msg.textContent = "請至少填寫活動代碼與名稱";
      return;
    }

    const btn = document.getElementById("submitBtn");
    btn.disabled = true; btn.textContent = "建立中…";
    msg.innerHTML = "";
    try{
      const res = await adminCreateActivity(fields, currentProfile.userId);
      const newActivityLink = `<br><a href="../detail.html?id=${encodeURIComponent(fields.id)}" target="_blank" rel="noopener">→ 查看新活動「${fields.title}」</a>`;
      msg.innerHTML = (res.unmapped && res.unmapped.length
        ? `⚠️ 活動已建立，但這些欄位在 Sheet 裡找不到對應欄名、沒有存進去：${res.unmapped.join("、")}（請檢查 activities 分頁的表頭）`
        : "✅ 活動已建立，可以到列表頁查看。") + newActivityLink;
      fieldIds.forEach(id => document.getElementById(id).value = "");
      resetDayFields();
      fetchNextActivityId().then(id => { document.getElementById("id").value = id; }).catch(()=>{});
      renderCoverPicker();
    }catch(e){
      console.error(e);
      msg.textContent = "❌ 建立失敗：" + e.message;
    }finally{
      btn.disabled = false; btn.textContent = "建立活動";
    }
  });
}

guardManagerPage(document.getElementById("app"), renderContent);
</script>
</body>
</html>
