<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>編輯活動</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<div class="topbar">
  <div>
    <span class="eyebrow">Managers Only</span>
    <h1>編輯活動</h1>
  </div>
</div>

<div class="admin-wrap">
  <div class="nav-links" id="navLinks">
    <a class="btn btn-ghost" href="../index.html">← 回列表頁</a>
    <a class="btn btn-ghost" id="backToDetailLink" style="display:none;" href="#">回本活動詳情頁 →</a>
  </div>
  <div id="app"><div class="loading">載入中…</div></div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="../assets/main.js"></script>
<script>
let currentProfile = null;
let activityMap = {};

const fieldIds = ["title","cover_image","area","date_text","event_date","price","capacity",
  "notes","itinerary","youtube_links","map_links","organizer_name","organizer_line_url","group_url"];

const formHtml = `
  <div class="panel">
    <p class="panel-title">選擇要編輯的活動</p>
    <div class="field">
      <select id="activitySelect"><option value="">載入中…</option></select>
    </div>
  </div>

  <div id="editForm" style="display:none;">
    <div class="panel">
      <p class="panel-title">基本資訊</p>
      <div class="field"><label>活動代碼（不可修改）</label><input id="idDisplay" disabled></div>
      <div class="field"><label>活動名稱</label><input id="title"></div>
      <div class="field"><label>地區</label><input id="area"></div>
      <div class="field"><label>日期文字（顯示用）</label><input id="date_text"></div>
      <div class="field"><label>活動日期（yyyy-mm-dd，判斷過期用）</label><input id="event_date" type="date"></div>
      <div class="field"><label>價格</label><input id="price" type="number"></div>
      <div class="field"><label>總名額</label><input id="capacity" type="number"></div>
    </div>

    <div class="panel">
      <p class="panel-title">封面圖片</p>
      <div class="field"><label>封面圖網址</label><input id="cover_image"></div>
      <div class="cover-picker" id="coverPicker"></div>
      <button class="btn btn-ghost btn-block" id="reshuffleCoverBtn" style="margin-top:10px;">換一批建議圖</button>
    </div>

    <div class="panel">
      <p class="panel-title">行程與連結</p>
      <div class="field"><label>備註（顯示在詳情頁行程之上）</label><textarea id="notes"></textarea></div>
      <div class="field"><label>行程（每一天用 || 分隔）</label><textarea id="itinerary"></textarea></div>
      <div class="field"><label>YouTube 連結（可多行，每行：說明文字 網址）</label><textarea id="youtube_links"></textarea></div>
      <div class="field"><label>Google Map 連結（可多行，每行：說明文字 網址）</label><textarea id="map_links"></textarea></div>
    </div>

    <div class="panel">
      <p class="panel-title">主辦資訊</p>
      <div class="field"><label>主辦人名稱</label><input id="organizer_name"></div>
      <div class="field"><label>主辦人 LINE 加好友連結</label><input id="organizer_line_url"></div>
      <div class="field"><label>揪團群組連結</label><input id="group_url"></div>
    </div>

    <button class="btn btn-primary btn-block" id="submitBtn">儲存變更</button>
    <p id="msg" class="join-note"></p>
  </div>
`;

async function renderCoverPicker(){
  const picker = document.getElementById("coverPicker");
  picker.innerHTML = `<span class="join-note">載入圖庫中…</span>`;
  try{
    const all = await fetchCoverImages();
    if(!all.length){ picker.innerHTML = `<span class="join-note">圖庫是空的</span>`; return; }
    const sample = pickRandom(all, 3);
    picker.innerHTML = sample.map(url => `<img class="cover-thumb" src="${url}" data-url="${url}">`).join("");
    picker.querySelectorAll(".cover-thumb").forEach(img=>{
      img.addEventListener("click", ()=>{ document.getElementById("cover_image").value = img.dataset.url; });
    });
  }catch(e){
    picker.innerHTML = `<span class="join-note">圖庫載入失敗</span>`;
  }
}

function fillForm(a){
  document.getElementById("idDisplay").value = a.id;
  document.getElementById("title").value = a.title || "";
  document.getElementById("area").value = a.area || "";
  document.getElementById("date_text").value = a.date || "";
  // <input type="date"> 只接受精確的 yyyy-MM-dd；Google Sheet 常把日期存成含時間的 ISO 字串
  // （例如 2026-08-07T16:00:00.000Z），直接賦值會被瀏覽器悄悄拒絕、欄位變空白，所以先截斷成前 10 碼。
  document.getElementById("event_date").value = String(a.eventDate || "").slice(0, 10);
  // <input type="number"> 一樣是嚴格格式，只要混到非數字字元（例如全形空格、貨幣符號）就會被拒絕，
  // 先過濾掉非數字/小數點的字元再賦值。
  document.getElementById("price").value = String(a.price || "").replace(/[^\d.]/g, "");
  document.getElementById("capacity").value = String(a.capacity || "").replace(/[^\d.]/g, "");
  document.getElementById("cover_image").value = a.cover || "";
  document.getElementById("notes").value = a.notes || "";
  document.getElementById("itinerary").value = (a.itineraryRaw !== undefined ? a.itineraryRaw : a.itinerary.join("||"));
  document.getElementById("youtube_links").value = a.youtubeLinksRaw || "";
  document.getElementById("map_links").value = a.mapLinksRaw || "";
  document.getElementById("organizer_name").value = a.organizerName || "";
  document.getElementById("organizer_line_url").value = a.organizerLineUrl || "";
  document.getElementById("group_url").value = a.groupUrl || "";
}

function selectActivity(id){
  const select = document.getElementById("activitySelect");
  const editForm = document.getElementById("editForm");
  const backLink = document.getElementById("backToDetailLink");
  if(!id || !activityMap[id]){
    editForm.style.display = "none";
    backLink.style.display = "none";
    return;
  }
  select.value = id;
  editForm.style.display = "block";
  fillForm(activityMap[id]);
  renderCoverPicker();
  backLink.href = `../detail.html?id=${encodeURIComponent(id)}`;
  backLink.style.display = "inline-block";
}

async function loadActivityOptions(preselectId){
  const select = document.getElementById("activitySelect");
  try{
    const activities = await fetchActivities();
    activityMap = Object.fromEntries(activities.map(a => [a.id, a]));
    select.innerHTML = `<option value="">請選擇活動…</option>` +
      activities.map(a => `<option value="${a.id}">${a.id} - ${a.title}（${a.date}）</option>`).join("");
    if(preselectId) selectActivity(preselectId);
  }catch(e){
    select.innerHTML = `<option value="">活動列表載入失敗</option>`;
  }
}

function renderContent(profile){
  currentProfile = profile;
  const app = document.getElementById("app");
  app.innerHTML = formHtml;

  const preselectId = new URLSearchParams(location.search).get("id");
  loadActivityOptions(preselectId);

  document.getElementById("activitySelect").addEventListener("change", (e)=> selectActivity(e.target.value));
  document.getElementById("reshuffleCoverBtn").addEventListener("click", renderCoverPicker);

  document.getElementById("submitBtn").addEventListener("click", async ()=>{
    const id = document.getElementById("activitySelect").value;
    if(!id) return;
    const msg = document.getElementById("msg");
    const fields = { id };
    fieldIds.forEach(fid => fields[fid] = document.getElementById(fid).value.trim());

    const btn = document.getElementById("submitBtn");
    btn.disabled = true; btn.textContent = "儲存中…";
    msg.textContent = "";
    try{
      const res = await adminUpdateActivity(fields, currentProfile.userId);
      msg.textContent = res.unmapped && res.unmapped.length
        ? `⚠️ 已儲存，但這些欄位在 Sheet 裡找不到對應欄名、沒有存進去：${res.unmapped.join("、")}（請檢查 activities 分頁的表頭）`
        : "✅ 已儲存變更";
      loadActivityOptions(id);
    }catch(e){
      console.error(e);
      msg.textContent = "❌ 儲存失敗：" + e.message;
    }finally{
      btn.disabled = false; btn.textContent = "儲存變更";
    }
  });
}

guardManagerPage(document.getElementById("app"), renderContent);
</script>
</body>
</html>
