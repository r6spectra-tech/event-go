<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>候補名單管理</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<div class="topbar">
  <div>
    <span class="eyebrow">Organizer Only</span>
    <h1>候補名單管理</h1>
  </div>
</div>

<div class="admin-wrap">
  <div class="nav-links">
    <a class="btn btn-ghost" href="../index.html">← 回列表頁</a>
    <a class="btn btn-ghost" id="backToDetailLink" style="display:none;" href="#">回本活動詳情頁 →</a>
  </div>
  <div id="app"><div class="loading">載入中…</div></div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="../assets/main.js"></script>
<script>
const statusLabel = { waiting:"排隊中", notified:"已通知，等待回覆", joined:"已加入", cancelled:"已取消", expired:"已逾期（24hr 未回覆）" };
let currentProfile = null;
let allActivities = [];

function isExpired(eventDate){
  if(!eventDate) return false;
  const d = new Date(eventDate);
  if(isNaN(d)) return false;
  const today = new Date();
  today.setHours(0,0,0,0);
  return d < today;
}

function rowHtml(entry){
  const canNotify = entry.status === "waiting" || entry.status === "notified" || entry.status === "expired";
  return `
  <div class="waitlist-row">
    <div>
      <div class="name">${entry.displayName || "(未提供名稱)"}</div>
      <div class="meta">userId: ${entry.userId.slice(0,10)}…｜排隊時間: ${entry.createdAt}</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="badge ${entry.status}">${statusLabel[entry.status] || entry.status}</span>
      ${canNotify ? `<button class="btn btn-teal notifyBtn" data-user="${entry.userId}">傳 LINE 通知</button>` : ""}
    </div>
  </div>`;
}

async function loadActivityOptions(preselectId){
  const select = document.getElementById("activitySelect");
  try{
    allActivities = await fetchActivities();
    let list = allActivities.filter(a => !isExpired(a.eventDate));
    // 如果是從活動詳情頁的候補連結帶 id 過來，就算該活動已過期也要能選到
    if(preselectId && !list.some(a => a.id === preselectId)){
      const found = allActivities.find(a => a.id === preselectId);
      if(found) list = [found, ...list];
    }
    if(!list.length){
      select.innerHTML = `<option value="">（沒有未過期的活動）</option>`;
      return;
    }
    select.innerHTML = `<option value="">請選擇活動…</option>` +
      list.map(a => `<option value="${a.id}">${a.id} - ${a.title}（${a.date}）</option>`).join("");
    if(preselectId){
      select.value = preselectId;
      onActivityChange(preselectId);
    }
  }catch(e){
    select.innerHTML = `<option value="">活動列表載入失敗</option>`;
  }
}

function onActivityChange(activityId){
  const backLink = document.getElementById("backToDetailLink");
  if(activityId){
    backLink.href = `../detail.html?id=${encodeURIComponent(activityId)}`;
    backLink.style.display = "inline-block";
  }else{
    backLink.style.display = "none";
  }
  loadWaitlist(activityId);
}

async function loadWaitlist(activityId){
  const listEl = document.getElementById("list");
  if(!activityId){ listEl.innerHTML = ""; return; }
  listEl.innerHTML = `<div class="loading">載入中…</div>`;
  try{
    const entries = await adminGetWaitlist(activityId, currentProfile.userId);
    if(!entries.length){
      listEl.innerHTML = `<div class="empty">目前沒有候補名單</div>`;
      return;
    }
    listEl.innerHTML = entries.map(rowHtml).join("");
    listEl.querySelectorAll(".notifyBtn").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        btn.disabled = true; btn.textContent = "通知中…";
        try{
          await adminNotify(activityId, btn.dataset.user, currentProfile.userId);
          btn.textContent = "已送出通知";
          loadWaitlist(activityId);
        }catch(e){
          alert("通知失敗：" + e.message);
          btn.disabled = false; btn.textContent = "傳 LINE 通知";
        }
      });
    });
  }catch(e){
    console.error(e);
    listEl.innerHTML = `<div class="empty">讀取失敗：${e.message}</div>`;
  }
}

function renderContent(profile){
  currentProfile = profile;
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="panel">
      <p class="panel-title">選擇活動 <span class="tag">未過期</span></p>
      <div class="field">
        <select id="activitySelect"><option value="">載入中…</option></select>
      </div>
    </div>
    <div class="panel">
      <p class="panel-title">候補名單</p>
      <div id="list"><div class="empty">請先選擇上方活動</div></div>
    </div>
  `;
  const select = document.getElementById("activitySelect");
  const preselectId = new URLSearchParams(location.search).get("id");
  loadActivityOptions(preselectId);
  select.addEventListener("change", ()=> onActivityChange(select.value));
}

guardManagerPage(document.getElementById("app"), renderContent);
</script>
</body>
</html>
