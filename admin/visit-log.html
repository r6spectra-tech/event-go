<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>閱讀記錄</title>
<link rel="stylesheet" href="../assets/style.css">
<style>
/* ===================================================
   高級黑黃主題 (Dark Amber & Gold Theme)
   =================================================== */
:root {
  --bg-main: #121214;          /* 深度霧黑背景 */
  --bg-card: #1e1e24;          /* 卡片區塊背景 */
  --bg-card-hover: #26262e;    /* 卡片懸浮效果 */
  --bg-input: #18181c;         /* 輸入框/下拉選單背景 */
  
  --gold-primary: #f59e0b;     /* 經典暖琥珀黃 (用於主標題) */
  --gold-bright: #fbbf24;      /* 明亮金色 (用於強調/微光) */
  --gold-dim: rgba(245, 158, 11, 0.15); /* 金黃透光襯底 */
  
  --text-main: #e2e8f0;        /* 內文主要顏色 (高對比冷灰白，不刺眼) */
  --text-muted: #94a3b8;       /* 次級文字顏色 (柔和灰) */
  --border-color: #2e2e38;     /* 邊框顏色 */
  --border-gold: #d97706;      /* 金色邊框 */

  /* 標籤顏色系統 (低飽和質感配色) */
  --pill-open: #38bdf8;
  --pill-joined: #34d399;
  --pill-waitlisted: #f59e0b;
  --pill-shared: #a78bfa;
  --pill-cancelled: #f87171;
  --pill-expired: #6b7280;
}

body {
  background-color: var(--bg-main);
  color: var(--text-main);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  margin: 0;
  padding: 0;
  line-height: 1.6;
}

/* 頂部列 */
.topbar {
  background: linear-gradient(180deg, #1c1c22 0%, var(--bg-main) 100%);
  padding: 2rem 1.5rem 1rem;
  border-bottom: 1px solid var(--border-color);
}
.eyebrow {
  display: inline-block;
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #fbbf24;
  background: rgba(251, 191, 36, 0.1);
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 0.5rem;
}
.topbar h1 {
  margin: 0;
  font-size: 1.8rem;
  color: var(--gold-primary); /* 標題黃色 */
  font-weight: 800;
  letter-spacing: -0.02em;
  text-shadow: 0 0 20px rgba(245, 158, 11, 0.2); /* 質感微光 */
}

/* 內容容器 */
.admin-wrap {
  max-width: 800px;
  margin: 0 auto;
  padding: 1.5rem;
}

/* 導航按鈕 */
.nav-links {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 1rem;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 500;
  text-decoration: none;
  transition: all 0.2s ease;
  cursor: pointer;
}
.btn-ghost {
  color: var(--text-muted);
  background: transparent;
  border: 1px solid var(--border-color);
}
.btn-ghost:hover {
  color: var(--gold-bright);
  border-color: var(--gold-primary);
  background: var(--gold-dim);
}

/* 面板 (Panel) */
.panel {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 1.25rem;
  margin-bottom: 1.25rem;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}
.panel-title-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.panel-title-inline {
  margin: 0;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text-main);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.tag {
  font-size: 0.75rem;
  background: var(--border-color);
  color: var(--text-muted);
  padding: 2px 6px;
  border-radius: 4px;
}
.join-note {
  margin: 0.5rem 0 0 0;
  font-size: 0.875rem;
  color: var(--gold-bright);
  font-weight: 500;
}

/* 篩選控制器 */
.field {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1rem;
}
.field label {
  font-size: 0.9rem;
  color: var(--text-muted);
  white-space: nowrap;
}
select {
  background: var(--bg-input);
  color: var(--text-main);
  border: 1px solid var(--border-color);
  padding: 0.5rem 1rem;
  border-radius: 6px;
  font-size: 0.9rem;
  outline: none;
  width: 100%;
  cursor: pointer;
  transition: border-color 0.2s;
}
select:focus {
  border-color: var(--gold-primary);
}
.hide-mine-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.9rem;
  color: var(--text-muted);
  cursor: pointer;
  user-select: none;
}
.hide-mine-row input[type="checkbox"] {
  accent-color: var(--gold-primary);
  width: 16px;
  height: 16px;
  cursor: pointer;
}

/* 日期分隔線 */
.log-date-header {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--gold-bright);
  margin: 1.5rem 0 0.75rem 0;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  letter-spacing: 0.05em;
}
.log-date-header::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--border-color);
}

/* 活動紀錄卡片 */
.log-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-left: 3px solid var(--border-color);
  border-radius: 8px;
  padding: 0.9rem 1.1rem;
  margin-bottom: 0.6rem;
  transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
}
.log-card:hover {
  background: var(--bg-card-hover);
  border-left-color: var(--gold-primary);
  transform: translateX(2px);
}
.log-card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.4rem;
}
.log-time {
  font-size: 0.8rem;
  color: var(--text-muted);
  font-family: monospace;
}
.log-body {
  margin: 0;
  font-size: 0.95rem;
  color: #cbd5e1;
}
.log-body b {
  color: #fff;
  font-weight: 600;
}

/* 行為 Pill 標籤 */
.action-pill {
  font-size: 0.75rem;
  padding: 2px 8px;
  border-radius: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.action-open { background: rgba(56, 189, 248, 0.12); color: var(--pill-open); }
.action-joined { background: rgba(52, 211, 153, 0.12); color: var(--pill-joined); }
.action-waitlisted { background: rgba(245, 158, 11, 0.12); color: var(--pill-waitlisted); }
.action-shared { background: rgba(167, 139, 250, 0.12); color: var(--pill-shared); }
.action-cancelled { background: rgba(248, 113, 113, 0.12); color: var(--pill-cancelled); }
.action-notified { background: rgba(245, 158, 11, 0.15); color: var(--gold-bright); border: 1px solid rgba(245, 158, 11, 0.3); }
.action-confirm-open { background: rgba(255, 255, 255, 0.08); color: #e2e8f0; }
.action-expired { background: rgba(107, 114, 128, 0.15); color: var(--pill-expired); }

/* 狀態顯示 */
.loading, .empty {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-muted);
  font-size: 0.95rem;
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px dashed var(--border-color);
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <span class="eyebrow">Managers Only</span>
    <h1>閱讀記錄</h1>
  </div>
</div>

<div class="admin-wrap">
  <div class="nav-links">
    <a class="btn btn-ghost" href="../index.html">← 回列表頁</a>
    <a class="btn btn-ghost" id="clearFilterLink" href="visit-log.html" style="display:none;">查看全部活動記錄 →</a>
  </div>
  <div id="app"><div class="loading">載入中…</div></div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="../assets/main.js"></script>
<script>
let currentProfile = null;
let rawLog = [];
const activityIdFilter = new URLSearchParams(location.search).get("activityId");

const actionInfo = {
  open:                     { label: "瀏覽", cls: "action-open" },
  joined:                   { label: "參加", cls: "action-joined" },
  waitlisted:               { label: "候補", cls: "action-waitlisted" },
  shared:                   { label: "分享", cls: "action-shared" },
  notified:                 { label: "通知候補", cls: "action-notified" },
  confirm_open:             { label: "打開確認頁", cls: "action-confirm-open" },
  waitlist_confirmed_join:  { label: "候補→加入", cls: "action-joined" },
  waitlist_confirmed_cancel:{ label: "候補→取消", cls: "action-cancelled" },
  waitlist_expired:         { label: "候補逾期", cls: "action-expired" },
};

function actionPill(action){
  const info = actionInfo[action] || { label: action, cls: "action-open" };
  return `<span class="action-pill ${info.cls}">${info.label}</span>`;
}

function lineText(e){
  const name = e.displayName || "(未知使用者)";
  switch(e.action){
    case "open":
      return e.refDisplayName
        ? `<b>${name}</b> 打開了 <b>${e.refDisplayName}</b> 分享的 ${e.activityDate} ${e.activityTitle} 活動頁`
        : `<b>${name}</b> 打開了 ${e.activityDate} ${e.activityTitle} 活動頁`;
    case "notified":
      return `<b>${name}</b> 通知 <b>${e.refDisplayName || "候補者"}</b> 遞補 ${e.activityDate} ${e.activityTitle}`;
    case "confirm_open":
      return `<b>${name}</b> 打開了候補確認頁 ${e.activityDate} ${e.activityTitle}`;
    case "waitlist_confirmed_join":
      return `<b>${name}</b> 在候補確認頁點了加入 ${e.activityDate} ${e.activityTitle}`;
    case "waitlist_confirmed_cancel":
      return `<b>${name}</b> 在候補確認頁點了取消 ${e.activityDate} ${e.activityTitle}`;
    case "waitlist_expired":
      return `<b>${name}</b> 的候補通知已逾 24 小時未回應 ${e.activityDate} ${e.activityTitle}`;
    case "joined":
      return `<b>${name}</b> 參加 ${e.activityDate} ${e.activityTitle} 活動頁`;
    case "waitlisted":
      return `<b>${name}</b> 候補 ${e.activityDate} ${e.activityTitle} 活動頁`;
    case "shared":
      return `<b>${name}</b> 分享 ${e.activityDate} ${e.activityTitle} 活動頁`;
    default:
      return `<b>${name}</b> ${e.action} ${e.activityDate} ${e.activityTitle} 活動頁`;
  }
}

// 依日期分組，組內只顯示時間；每一筆是自己獨立的卡片
function renderLines(log){
  if(!log.length) return `<div class="empty">沒有符合條件的記錄</div>`;
  let html = "";
  let currentDate = null;
  log.forEach(e => {
    const [datePart, timePart] = e.timestamp.split(" ");
    if(datePart !== currentDate){
      currentDate = datePart;
      html += `<div class="log-date-header">📅 ${datePart}</div>`;
    }
    html += `<div class="log-card">
      <div class="log-card-top">
        <span class="log-time">${timePart || ""}</span>
        ${actionPill(e.action)}
      </div>
      <p class="log-body">${lineText(e)}</p>
    </div>`;
  });
  return html;
}

function applyFilters(){
  const actionFilter = document.getElementById("actionFilter").value;
  const hideMine = document.getElementById("hideMineToggle").checked;
  let filtered = rawLog;
  if(actionFilter !== "all") filtered = filtered.filter(e => e.action === actionFilter);
  if(hideMine) filtered = filtered.filter(e => e.userId !== currentProfile.userId);
  document.getElementById("logList").innerHTML = renderLines(filtered);
}

async function loadLog(){
  const listEl = document.getElementById("logList");
  listEl.innerHTML = `<div class="loading">載入中…</div>`;
  try{
    rawLog = await adminGetVisitLog(currentProfile.userId, activityIdFilter);
    applyFilters();
    updateShareCount();
  }catch(e){
    console.error(e);
    listEl.innerHTML = `<div class="empty">讀取失敗：${e.message}</div>`;
  }
}

function updateShareCount(){
  const el = document.getElementById("shareCountLabel");
  if(!el) return;
  const count = rawLog.filter(e => e.action === "shared").length;
  el.textContent = `分享次數：${count}`;
}

function renderContent(profile){
  currentProfile = profile;
  const app = document.getElementById("app");

  if(activityIdFilter){
    document.getElementById("clearFilterLink").style.display = "inline-block";
  }

  app.innerHTML = `
    <div class="panel">
      <div class="panel-title-row">
        <p class="panel-title-inline">${activityIdFilter ? "此活動紀錄" : "所有活動紀錄"} <span class="tag">最新在上</span></p>
        <button class="btn btn-ghost refresh-btn" id="refreshBtn">🔄 重新整理</button>
      </div>
      <p class="join-note" id="shareCountLabel">分享次數：…</p>
    </div>

    <div class="panel">
      <div class="field">
        <label>篩選行為：</label>
        <select id="actionFilter">
          <option value="all">全部行為</option>
          <option value="open">瀏覽</option>
          <option value="joined">參加</option>
          <option value="waitlisted">候補</option>
          <option value="shared">分享</option>
          <option value="notified">通知候補</option>
          <option value="confirm_open">打開確認頁</option>
          <option value="waitlist_confirmed_join">候補→加入</option>
          <option value="waitlist_confirmed_cancel">候補→取消</option>
          <option value="waitlist_expired">候補逾期</option>
        </select>
      </div>
      <label class="hide-mine-row">
        <input type="checkbox" id="hideMineToggle" checked> 隱藏我的記錄
      </label>
    </div>

    <div id="logList"></div>
  `;
  document.getElementById("refreshBtn").addEventListener("click", loadLog);
  document.getElementById("actionFilter").addEventListener("change", applyFilters);
  document.getElementById("hideMineToggle").addEventListener("change", applyFilters);
  loadLog();
}

guardManagerPage(document.getElementById("app"), renderContent);
</script>
</body>
</html>
