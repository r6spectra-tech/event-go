<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動詳情</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="topbar">
  <div>
    <span class="eyebrow">Itinerary</span>
    <h1 id="pageTitle">活動詳情</h1>
  </div>
</div>

<div class="detail-wrap" id="content">
  <div class="loading">載入中…</div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="assets/main.js"></script>
<script>
function videoBlock(a){
  if(!a.youtubeItems.length) return "";
  return `
    <span class="section-label">活動影片</span>
    ${a.youtubeItems.map(item=>{
      const vid = extractYoutubeId(item.url);
      return `
      <div class="media-item">
        <p class="media-label">${item.label}</p>
        ${vid
          ? `<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen loading="lazy"></iframe></div>`
          : `<a class="btn btn-ghost btn-block" href="${item.url}" target="_blank" rel="noopener">開啟影片 →</a>`}
      </div>`;
    }).join("")}
  `;
}

function mapBlock(a){
  if(!a.mapItems.length) return "";
  return `
    <span class="section-label">地點 / Google Map</span>
    <div class="map-list">
      ${a.mapItems.map(item=>`
        <a class="btn btn-ghost btn-block map-link" href="${item.url}" target="_blank" rel="noopener">📍 ${item.label}</a>
      `).join("")}
    </div>
  `;
}

function joinBlock(a){
  if(!a.isFull){
    return `
    <p class="join-note">目前已報名 ${a.joined} / ${a.capacity} 人，尚有名額。</p>
    ${a.groupUrl ? `<a class="btn btn-teal btn-block" href="${a.groupUrl}" target="_blank" rel="noopener">加入揪團群組</a>`
                 : `<p class="join-note">主辦人尚未提供群組連結。</p>`}`;
  }
  return `
    <p class="join-note">此活動人數已滿（${a.joined}/${a.capacity}），可加入候補名單排隊。有名額釋出時，
    主辦人會透過 LINE 通知您，請留意訊息並點擊回覆。</p>
    <button class="btn btn-stamp btn-block" id="waitlistBtn">加入候補名單</button>
    <p class="join-note" id="waitlistStatus"></p>`;
}

function render(a){
  document.getElementById("pageTitle").textContent = a.title;
  document.title = a.title;
  document.getElementById("content").innerHTML = `
    ${a.cover ? `<img class="hero-img" src="${a.cover}" alt="${a.title}">` : ""}
    <p class="detail-title">${a.title}</p>
    <p class="detail-meta">${a.area}｜${a.date}${a.price ? `｜NT$ ${a.price}` : ""}</p>

    <span class="section-label">活動行程</span>
    <ul class="itinerary-list">
      ${a.itinerary.length ? a.itinerary.map(step=>`<li>${step}</li>`).join("") : "<li>行程資訊準備中</li>"}
    </ul>

    ${videoBlock(a)}
    ${mapBlock(a)}

    <div class="footer-card">
      <div class="organizer-row">
        <div class="organizer-avatar"></div>
        <div>
          <strong>${a.organizerName}</strong><br>
          <span style="font-size:0.8rem;color:#777;">活動主辦人</span>
        </div>
      </div>
      ${a.organizerLineUrl ? `<a class="btn btn-ghost btn-block" href="${a.organizerLineUrl}" target="_blank" rel="noopener">加主辦人 LINE 好友</a>` : ""}
      <div style="margin-top:16px;">
        ${joinBlock(a)}
      </div>
    </div>

    <div class="actions" style="padding:20px 0 0;">
      <button class="btn btn-primary" id="shareBtn">分享這個行程</button>
    </div>
  `;
  document.getElementById("shareBtn").addEventListener("click", ()=> shareOne(a));

  const waitlistBtn = document.getElementById("waitlistBtn");
  if(waitlistBtn){
    waitlistBtn.addEventListener("click", async ()=>{
      waitlistBtn.disabled = true;
      waitlistBtn.textContent = "處理中…";
      const statusEl = document.getElementById("waitlistStatus");
      try{
        const res = await joinWaitlist(a.id);
        statusEl.textContent = res.already
          ? "您已經在候補名單中，請耐心等候通知。"
          : "已加入候補名單！有名額釋出時，主辦人會用 LINE 通知您。";
        waitlistBtn.textContent = "已加入候補";
      }catch(e){
        console.error(e);
        statusEl.textContent = "加入候補失敗，請稍後再試或聯繫主辦人。";
        waitlistBtn.disabled = false;
        waitlistBtn.textContent = "加入候補名單";
      }
    });
  }
}

async function main(){
  // 開啟本頁一律先登入 LINE，取得 userId（候補功能需要識別使用者）
  try{
    await requireLogin();
  }catch(e){
    console.warn("LINE 登入未完成，部分功能（候補）將無法使用", e);
  }

  const id = new URLSearchParams(location.search).get("id");
  if(!id){
    document.getElementById("content").innerHTML = `<div class="empty">缺少活動 id</div>`;
    return;
  }
  try{
    const a = await getActivityById(id);
    if(!a){
      document.getElementById("content").innerHTML = `<div class="empty">找不到這個活動</div>`;
      return;
    }
    render(a);
  }catch(e){
    console.error(e);
    document.getElementById("content").innerHTML = `<div class="empty">活動資料讀取失敗</div>`;
  }
}

main();
</script>
</body>
</html>
