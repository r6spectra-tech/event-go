<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動詳情</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  /* ==========================================
     黑底黃字主題樣式覆蓋 (Theme Overrides)
     ========================================== */
  :root {
    --bg-dark: #0d0d0d;
    --bg-card: #18181b;
    --bg-card-hover: #27272a;
    --border-color: #3f3f46;
    --brand-yellow: #ffe600;
    --brand-yellow-hover: #e6cf00;
    --text-primary: #f4f4f5;
    --text-muted: #a1a1aa;
    --accent-red: #ef4444;
  }

  body {
    background-color: var(--bg-dark);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    margin: 0;
    padding-bottom: 80px;
  }

  /* 頂部導覽 */
  .topbar {
    background: rgba(13, 13, 13, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-color);
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 12px 20px;
  }
  .eyebrow {
    color: var(--brand-yellow);
    font-weight: bold;
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 1.5px;
  }
  .topbar h1 {
    color: var(--brand-yellow);
    font-size: 1.4rem;
    margin: 2px 0 0;
    font-weight: 800;
  }

  .detail-wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 16px;
  }

  /* 視覺主圖 */
  .hero-img {
    width: 100%;
    border-radius: 12px;
    object-fit: cover;
    max-height: 320px;
    margin-bottom: 20px;
    border: 1px solid var(--border-color);
  }

  /* 標題與基本資訊 */
  .detail-title {
    color: var(--brand-yellow);
    font-size: 1.75rem;
    font-weight: 800;
    line-height: 1.3;
    margin: 0 0 8px 0;
  }
  .detail-meta {
    color: var(--text-muted);
    font-size: 0.95rem;
    margin-bottom: 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .detail-meta-tag {
    background: #27272a;
    color: #e4e4e7;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.85rem;
  }

  /* 區塊標題 */
  .section-label {
    color: var(--brand-yellow);
    font-size: 1.1rem;
    font-weight: 700;
    display: block;
    margin: 24px 0 12px;
    border-left: 4px solid var(--brand-yellow);
    padding-left: 8px;
  }

  /* 備註與卡片 */
  .notes-box, .footer-card, .itinerary-day {
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .notes-box p {
    margin: 4px 0;
    color: #d4d4d8;
    line-height: 1.6;
  }

  /* 行程清單 */
  .itinerary-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .itinerary-list li {
    position: relative;
    padding-left: 20px;
    margin-bottom: 10px;
    color: #e4e4e7;
  }
  .itinerary-list li::before {
    content: "•";
    color: var(--brand-yellow);
    font-weight: bold;
    position: absolute;
    left: 0;
  }
  .itinerary-list li.link-line::before {
    content: "|";
    color: var(--text-muted);
  }

  /* Chip 連結列 */
  .chip-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .chip-link {
    background: #27272a;
    color: var(--brand-yellow);
    border: 1px solid var(--border-color);
    padding: 8px 14px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .chip-link:hover {
    background: var(--brand-yellow);
    color: #000;
  }

  /* 按鈕系統 */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: background 0.2s, transform 0.1s;
    font-size: 0.95rem;
  }
  .btn:active { transform: scale(0.98); }
  .btn-yellow {
    background-color: var(--brand-yellow);
    color: #000;
  }
  .btn-yellow:hover { background-color: var(--brand-yellow-hover); }
  .btn-outline {
    background-color: transparent;
    border: 1px solid var(--brand-yellow);
    color: var(--brand-yellow);
  }
  .btn-outline:hover { background-color: rgba(255, 230, 0, 0.1); }
  .btn-ghost {
    background-color: #27272a;
    color: #e4e4e7;
    border: 1px solid var(--border-color);
  }
  .btn-ghost:hover { background-color: #3f3f46; }
  .btn-block { width: 100%; box-sizing: border-box; }

  /* 浮動管理員按鈕 (FAB) */
  .fab-admin {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--brand-yellow);
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    box-shadow: 0 4px 20px rgba(255, 230, 0, 0.3);
    cursor: pointer;
    z-index: 90;
    border: none;
  }

  /* Modal 彈窗優化 */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .modal-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 480px;
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 1.2rem;
    cursor: pointer;
  }
  .modal-title {
    color: var(--brand-yellow);
    font-size: 1.3rem;
    font-weight: 700;
    margin-top: 0;
    margin-bottom: 16px;
  }

  /* 提醒與狀態註記 */
  .join-note {
    color: #d4d4d8;
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 12px;
  }
  .oa-reminder {
    background: #27272a;
    border-left: 3px solid var(--brand-yellow);
    padding: 12px;
    border-radius: 4px;
    margin: 12px 0;
    font-size: 0.85rem;
    color: #e4e4e7;
  }

  .loading, .empty {
    text-align: center;
    padding: 40px 0;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <span class="eyebrow">Itinerary</span>
    <h1 id="pageTitle">活動詳情</h1>
  </div>
</div>

<div class="detail-wrap" id="content">
  <div class="loading">載入中…</div>
</div>

<!-- 浮動管理功能按鈕 -->
<button class="fab-admin" id="adminFabBtn" title="管理員功能">⚙️</button>

<!-- 報名狀態 Modal -->
<div id="rsvpModal" class="modal-overlay" style="display:none;">
  <div class="modal-card">
    <button type="button" class="modal-close" id="rsvpModalClose">✕</button>
    <div class="modal-title">活動報名狀態</div>
    <div id="rsvpModalBody">
      <div class="loading">正在查詢最新狀態…</div>
    </div>
  </div>
</div>

<!-- 管理員選單 Modal -->
<div id="adminModal" class="modal-overlay" style="display:none;">
  <div class="modal-card">
    <button type="button" class="modal-close" id="adminModalClose">✕</button>
    <div class="modal-title">⚙️ 活動管理主控台</div>
    <div id="adminModalBody">
      <div class="loading">正在驗證管理權限…</div>
    </div>
  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="assets/main.js"></script>
<script>
let currentActivity = null;
let userProfile = null;

// Chip UI 組件
function chipRow(items, icon){
  if(!items || !items.length) return "";
  return `<div class="chip-row">
    ${items.map(item => `<a class="chip-link" href="${item.url}" target="_blank" rel="noopener">${icon} ${item.label}</a>`).join("")}
  </div>`;
}

function videoBlock(a){
  if(!a.youtubeItems || !a.youtubeItems.length) return "";
  return `<span class="section-label">活動影片</span>${chipRow(a.youtubeItems, "▶")}`;
}

function mapBlock(a){
  if(!a.mapItems || !a.mapItems.length) return "";
  return `<span class="section-label">地點 / Google Map</span>${chipRow(a.mapItems, "📍")}`;
}

// 動態報名狀態選單 (由 Modal 打開時動態渲染)
function joinBlock(a){
  const myStatus = a.myStatus || {};
  if(!a.isFull){
    if(myStatus.joined){
      return `
      <p class="join-note" style="color:var(--brand-yellow); font-weight:bold;">🎉 您已經參加這個活動了！</p>
      ${a.groupUrl
        ? `<a class="btn btn-yellow btn-block" href="${a.groupUrl}" target="_blank" rel="noopener">加入揪團群組 →</a>`
        : `<p class="join-note">主辦人尚未提供群組連結，請透過主辦人 LINE 聯繫。</p>`}`;
    }
    return `
    <p class="join-note">目前已報名 <b style="color:var(--brand-yellow);">${a.joined}</b> / ${a.capacity} 人，尚有名額。</p>
    <button class="btn btn-yellow btn-block" id="joinBtn">立即參加活動</button>
    <div id="joinResult" style="margin-top:10px;"></div>`;
  }
  if(!a.waitlistOpen){
    return `<p class="join-note">此活動人數已滿（${a.joined}/${a.capacity}），目前未開放候補，請直接聯繫主辦人。</p>`;
  }
  if(myStatus.waitlistStatus === "waiting" || myStatus.waitlistStatus === "notified"){
    return `<p class="join-note">您已經在候補名單中，請耐心等候 LINE 通知（記得先加官方帳號好友，不然收不到通知）。</p>`;
  }
  if(myStatus.waitlistStatus === "expired"){
    return `<p class="join-note">您先前收到的候補通知已逾期，如果還想候補請直接聯繫主辦人。</p>`;
  }
  if(myStatus.waitlistStatus === "cancelled"){
    return `<p class="join-note">您先前已選擇不加入這個活動的候補。如果想更改決定，請直接聯繫主辦人。</p>`;
  }
  return `
    <p class="join-note">此活動人數已滿（${a.joined}/${a.capacity}），可加入候補名單排隊。有名額釋出時，主辦人會透過 LINE 通知您，請於通知後 24 小時內回覆。</p>
    <div class="oa-reminder">
      ⚠️ <b>請務必先加 LINE 官方帳號好友</b>，候補通知是用官方帳號推播的，沒加好友會收不到通知！
      <a class="btn btn-outline btn-block" href="${CONFIG.OA_LINE_URL}" target="_blank" rel="noopener" style="margin-top:8px;">加 LINE 官方帳號好友</a>
    </div>
    <button class="btn btn-yellow btn-block" id="waitlistBtn" style="margin-top:10px;">加入候補名單</button>
    <p class="join-note" id="waitlistStatus"></p>`;
}

function itineraryLineHtml(item){
  if(item.type === "text") return `<li>${item.text}</li>`;
  const icon = item.isYoutube ? "▶️" : (item.isMap ? "📍" : "🔗");
  const shown = item.label ? item.label : icon;
  return `<li class="link-line"><a class="chip-link" style="display:inline-block; padding:2px 8px; margin:2px 0;" href="${item.url}" target="_blank" rel="noopener">${shown}</a></li>`;
}

function itineraryBlock(a){
  if(a.days > 0 && a.itineraryDays && a.itineraryDays.length){
    return a.itineraryDays.map(day => `
      <div class="itinerary-day">
        <span class="section-label" style="margin-top:0;">第 ${day.dayNumber} 天行程</span>
        <ul class="itinerary-list">
          ${day.lines && day.lines.length ? day.lines.map(itineraryLineHtml).join("") : "<li>行程資訊準備中</li>"}
        </ul>
      </div>
    `).join("");
  }
  return `<div class="notes-box"><ul class="itinerary-list">
    ${a.itinerary && a.itinerary.length ? a.itinerary.map(step=>`<li>${step}</li>`).join("") : "<li>行程資訊準備中</li>"}
  </ul></div>`;
}

// 靜態渲染（適合快取的 detail 主體）
function render(a){
  document.getElementById("pageTitle").textContent = a.title;
  document.title = a.title;
  document.getElementById("content").innerHTML = `
    ${a.cover ? `<img class="hero-img" src="${a.cover}" alt="${a.title}">` : ""}
    <h2 class="detail-title">${a.title}</h2>
    <div class="detail-meta">
      <span class="detail-meta-tag">📍 ${a.area}</span>
      <span class="detail-meta-tag">📅 ${a.date}</span>
      ${a.price ? `<span class="detail-meta-tag" style="color:var(--brand-yellow);">💰 NT$ ${a.price}</span>` : ""}
    </div>

    ${a.notes ? `<span class="section-label">備註事項</span><div class="notes-box">${a.notes.split("\n").map(l=>`<p>${l}</p>`).join("")}</div>` : ""}

    <span class="section-label">活動行程</span>
    ${itineraryBlock(a)}

    ${videoBlock(a)}
    ${mapBlock(a)}

    <div class="footer-card" style="margin-top:24px;">
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
        <div style="width:40px; height:40px; border-radius:50%; background:#3f3f46; display:flex; align-items:center; justify-content:center;">👤</div>
        <div>
          <strong style="color:var(--brand-yellow); font-size:1rem;">${a.organizerName}</strong><br>
          <span style="font-size:0.8rem; color:var(--text-muted);">活動主辦人</span>
        </div>
      </div>
      ${a.organizerLineUrl ? `<a class="btn btn-ghost btn-block" href="${a.organizerLineUrl}" target="_blank" rel="noopener">聯繫主辦人 LINE</a>` : ""}
      <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
        <button type="button" class="btn btn-yellow btn-block" id="openRsvpBtn">查看活動報名狀態</button>
        <a class="btn btn-ghost btn-block" href="me.html">我的活動</a>
      </div>
    </div>

    <div style="padding:16px 0;">
      <button class="btn btn-outline btn-block" id="shareBtn">🔗 分享這個行程</button>
    </div>
  `;

  document.getElementById("shareBtn").addEventListener("click", ()=> shareOne(a));
  document.getElementById("openRsvpBtn").addEventListener("click", ()=> openRsvpModal(a));
}

// 打開報名彈窗並即時查詢 status
async function openRsvpModal(a){
  const modalBody = document.getElementById("rsvpModalBody");
  document.getElementById("rsvpModal").style.display = "flex";
  modalBody.innerHTML = `<div class="loading">查詢報名狀態中…</div>`;

  try {
    if (userProfile) {
      a.myStatus = await getMyActivityStatus(a.id);
    }
    modalBody.innerHTML = joinBlock(a);
    wireJoinButtons(a);
  } catch (e) {
    modalBody.innerHTML = `<p class="join-note" style="color:var(--accent-red);">狀態讀取失敗：${e.message || e}</p>`;
  }
}

function closeRsvpModal(){
  document.getElementById("rsvpModal").style.display = "none";
}

function wireJoinButtons(a){
  const joinBtn = document.getElementById("joinBtn");
  if(joinBtn){
    joinBtn.addEventListener("click", async ()=>{
      joinBtn.disabled = true;
      joinBtn.textContent = "處理中…";
      const resultEl = document.getElementById("joinResult");
      try{
        const res = await joinActivity(a.id);
        joinBtn.style.display = "none";
        a.myStatus = a.myStatus || {};
        a.myStatus.joined = true;
        resultEl.innerHTML = `
          <p class="join-note" style="color:var(--brand-yellow); font-weight:bold;">${res.already ? "您已經參加這個活動了！" : "🎉 已為您報名這個活動！"}</p>
          ${res.groupUrl
            ? `<a class="btn btn-yellow btn-block" href="${res.groupUrl}" target="_blank" rel="noopener">加入揪團群組 →</a>`
            : `<p class="join-note">主辦人尚未提供群組連結，請透過主辦人 LINE 聯繫。</p>`}
        `;
      }catch(e){
        console.error(e);
        resultEl.innerHTML = `<p class="join-note" style="color:var(--accent-red);">報名失敗：${e.message}</p>`;
        joinBtn.disabled = false;
        joinBtn.textContent = "立即參加活動";
      }
    });
  }

  const waitlistBtn = document.getElementById("waitlistBtn");
  if(waitlistBtn){
    waitlistBtn.addEventListener("click", async ()=>{
      waitlistBtn.disabled = true;
      waitlistBtn.textContent = "處理中…";
      const statusEl = document.getElementById("waitlistStatus");
      try{
        const res = await joinWaitlist(a.id);
        a.myStatus = a.myStatus || {};
        a.myStatus.waitlistStatus = "waiting";
        statusEl.innerHTML = res.already
          ? "您已經在候補名單中，請耐心等候通知。"
          : `已加入候補名單！有名額釋出時，主辦人會用 LINE 通知您。<br>
             <a href="${CONFIG.OA_LINE_URL}" target="_blank" rel="noopener" style="color:var(--brand-yellow);">點此加官方帳號好友</a>`;
        waitlistBtn.textContent = "已加入候補";
      }catch(e){
        console.error(e);
        statusEl.textContent = "加入候補失敗，請稍後再試或聯繫主辦人。";
        waitlistBtn.disabled = false;
        waitlistBtn.textContent = "加入候補名單";
      }
    });
  }
}

/* ==========================================
   點擊浮動按鈕後，延遲載入管理權限與介面
   ========================================== */
document.getElementById("adminFabBtn").addEventListener("click", async () => {
  const modal = document.getElementById("adminModal");
  const modalBody = document.getElementById("adminModalBody");
  modal.style.display = "flex";
  modalBody.innerHTML = `<div class="loading">權限驗證中…</div>`;

  if(!userProfile){
    modalBody.innerHTML = `<p class="join-note" style="color:var(--accent-red);">無法取得使用者身分，請確認 LINE 登入狀態。</p>`;
    return;
  }

  try {
    const { status } = await checkIsManager(userProfile.userId);
    if(status !== "approved"){
      modalBody.innerHTML = `<p class="join-note">您目前沒有此活動的管理權限。</p>`;
      return;
    }

    modalBody.innerHTML = `
      <div style="display:flex; flex-direction:column; gap:10px;">
        <a class="btn btn-ghost" href="admin/edit-activity.html?id=${encodeURIComponent(currentActivity.id)}">✏️ 編輯此活動</a>
        <a class="btn btn-ghost" id="waitlistCountLink" href="admin/waitlist.html?id=${encodeURIComponent(currentActivity.id)}">候補人數讀取中…</a>
        <a class="btn btn-ghost" id="visitLogLink" href="admin/visit-log.html?activityId=${encodeURIComponent(currentActivity.id)}">閱讀記錄讀取中…</a>
        <button type="button" class="btn btn-outline" id="waitlistToggleBtn"></button>
      </div>
    `;

    // 異步載入數量統計
    adminGetWaitlistCount(currentActivity.id, userProfile.userId)
      .then(({ count }) => {
        const el = document.getElementById("waitlistCountLink");
        if(el) el.textContent = `📋 候補名單 (${count} 人) →`;
      }).catch(e => console.warn(e));

    adminGetVisitLog(userProfile.userId, currentActivity.id)
      .then(log => {
        const el = document.getElementById("visitLogLink");
        if(el) el.textContent = `👁️ 閱讀記錄 (${log.length} 筆) →`;
      }).catch(e => console.warn(e));

    renderWaitlistToggle(currentActivity, userProfile.userId);

  } catch (e) {
    modalBody.innerHTML = `<p class="join-note" style="color:var(--accent-red);">驗證失敗：${e.message || e}</p>`;
  }
});

function renderWaitlistToggle(a, userId){
  const btn = document.getElementById("waitlistToggleBtn");
  if(!btn) return;
  function paint(){
    btn.textContent = a.waitlistOpen ? "候補狀態：開放中 (點擊關閉)" : "候補狀態：已關閉 (點擊開放)";
  }
  paint();
  btn.addEventListener("click", async ()=>{
    btn.disabled = true;
    const newValue = a.waitlistOpen ? "closed" : "";
    try{
      await adminUpdateActivity({ id: a.id, waitlist_status: newValue }, userId);
      a.waitlistOpen = !a.waitlistOpen;
      paint();
    }catch(e){
      alert("切換失敗：" + e.message);
    }finally{
      btn.disabled = false;
    }
  });
}

document.getElementById("adminModalClose").addEventListener("click", () => {
  document.getElementById("adminModal").style.display = "none";
});

async function main(){
  try{
    userProfile = await requireLogin();
  }catch(e){
    console.warn("LINE 登入未完成，部分功能將無法使用", e);
  }

  const id = new URLSearchParams(location.search).get("id");
  if(!id){
    document.getElementById("content").innerHTML = `<div class="empty">缺少活動 ID</div>`;
    return;
  }
  try{
    currentActivity = await getActivityById(id);
    if(!currentActivity){
      document.getElementById("content").innerHTML = `<div class="empty">找不到這個活動</div>`;
      return;
    }
    render(currentActivity);

    const params = new URLSearchParams(location.search);
    const refUserId = params.get("refId");
    const refDisplayName = params.get("refName");
    recordVisit(currentActivity.id, refUserId ? { refUserId, refDisplayName } : null);
  }catch(e){
    console.error(e);
    document.getElementById("content").innerHTML = `<div class="empty">活動資料讀取失敗：${e.message || e}</div>`;
  }
}

main();

document.getElementById("rsvpModalClose").addEventListener("click", closeRsvpModal);
document.getElementById("rsvpModal").addEventListener("click", (e)=>{
  if(e.target.id === "rsvpModal") closeRsvpModal();
});
</script>
</body>
