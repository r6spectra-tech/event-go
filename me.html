<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的活動</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  /* === 現代化 UI 重置與變數定義 === */
  :root {
    --primary-color: #2563eb;
    --bg-color: #f1f5f9;
    --card-bg: #ffffff;
    --text-main: #0f172a;
    --text-sub: #475569;
    --border-color: #cbd5e1;
    --radius-md: 10px;
    --radius-lg: 16px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  }

  body {
    background-color: var(--bg-color);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    margin: 0;
    padding: 0;
  }

  /* 頂部列美化 */
  .topbar {
    background: #ffffff;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  @media (min-width: 640px) {
    .topbar {
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
    }
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--primary-color);
    background: #eff6ff;
    padding: 2px 8px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 4px;
  }

  .topbar h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 800;
  }

  /* 管理者按鈕區塊 */
  #managerArea {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .manager-link {
    font-size: 12px !important;
    padding: 4px 10px !important;
    background: #f8fafc;
    border: 1px solid var(--border-color);
    color: var(--text-sub);
    border-radius: 6px;
    text-decoration: none;
    transition: all 0.2s;
  }

  .manager-link:hover {
    background: #e2e8f0;
    color: var(--text-main);
  }

  /* 主容器 */
  .admin-wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 20px 16px;
  }

  /* 面板卡片 */
  .panel {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 20px;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--border-color);
    margin-bottom: 24px;
  }

  .panel-title {
    font-size: 17px;
    font-weight: 800;
    margin: 0 0 16px 0;
    color: var(--text-main);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* 活動單項卡片 */
  .my-activity-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: var(--radius-md);
    margin-bottom: 10px;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s ease;
    box-shadow: 0 1px 2px rgba(0,0,0,0.02);
  }

  .my-activity-row:hover {
    border-color: var(--primary-color);
    transform: translateY(-1px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.05);
  }

  .my-activity-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding-right: 12px;
  }

  .my-activity-title {
    margin: 0;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-main);
    line-height: 1.4;
  }

  .my-activity-date {
    margin: 0;
    font-size: 13px;
    color: var(--text-sub);
    font-weight: 500;
  }

  /* Badge 狀態標籤 */
  .cat-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .cat-joined     { background: #dcfce7; color: #166534; }
  .cat-waitlisted { background: #ffedd5; color: #9a3412; }
  .cat-viewed     { background: #dbeafe; color: #1e40af; }

  /* 已過期區域樣式淡化 */
  #expiredList .my-activity-row {
    background: #f8fafc;
    border-color: #e2e8f0;
    opacity: 0.75;
  }

  #expiredList .my-activity-row:hover {
    opacity: 1;
  }

  /* 載入與空狀態 */
  .loading, .empty {
    text-align: center;
    padding: 40px 0;
    color: var(--text-sub);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <span class="eyebrow">My Activities</span>
    <h1>我的活動</h1>
  </div>
  <div id="managerArea"></div>
</div>

<div class="admin-wrap" id="content">
  <div class="loading">載入中…</div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="assets/main.js"></script>
<script>
const categoryInfo = {
  joined:     { label: "🟩 已參加", cls: "cat-joined" },
  waitlisted: { label: "🟧 候補中", cls: "cat-waitlisted" },
  viewed:     { label: "🟦 看過",   cls: "cat-viewed" },
};

function waitlistLabel(item){
  if(item.category !== "waitlisted") return categoryInfo[item.category];
  if(item.waitlistStatus === "cancelled") return { label: "🟧 候補已取消", cls: "cat-waitlisted" };
  if(item.waitlistStatus === "expired") return { label: "🟧 候補已逾期", cls: "cat-waitlisted" };
  return categoryInfo.waitlisted;
}

function itemHtml(item){
  const info = waitlistLabel(item);
  return `
  <a class="my-activity-row" href="detail.html?id=${encodeURIComponent(item.activityId)}">
    <div class="my-activity-info">
      <p class="my-activity-title">${item.title}</p>
      <p class="my-activity-date">📅 ${item.date}</p>
    </div>
    <span class="cat-badge ${info.cls}">${info.label}</span>
  </a>`;
}

function renderList(list){
  if(!list.length) return `<div class="empty">目前沒有紀錄</div>`;
  return list.map(itemHtml).join("");
}

async function main(){
  setupManagerArea();

  let profile;
  try{
    profile = await requireLogin();
  }catch(e){
    console.error(e);
    document.getElementById("content").innerHTML = `<div class="empty">需要 LINE 登入才能查看個人紀錄（${e.message || e}）</div>`;
    return;
  }

  try{
    const items = await getMyActivities();
    const current = items.filter(i => !i.expired);
    const expired = items.filter(i => i.expired);

    document.getElementById("content").innerHTML = `
      <div class="panel">
        <p class="panel-title">📌 目前的活動</p>
        <div id="currentList">${renderList(current)}</div>
      </div>
      <div class="panel">
        <p class="panel-title">⌛ 已過期</p>
        <div id="expiredList">${renderList(expired)}</div>
      </div>
    `;
  }catch(e){
    console.error(e);
    document.getElementById("content").innerHTML = `<div class="empty">讀取失敗：${e.message}</div>`;
  }
}

async function setupManagerArea(){
  const area = document.getElementById("managerArea");
  try{
    const ok = await ensureLiff();
    if(!ok || !liff.isLoggedIn()) return;
    const profile = await liff.getProfile();
    const { status } = await checkIsManager(profile.userId);
    if(status === "approved"){
      area.innerHTML = `
        <a class="btn manager-link" href="admin/new-activity.html">新增活動</a>
        <a class="btn manager-link" href="admin/edit-activity.html">編輯活動</a>
        <a class="btn manager-link" href="admin/waitlist.html">候補管理</a>
        <a class="btn manager-link" href="admin/visit-log.html">閱讀記錄</a>
        <a class="btn manager-link" href="admin/managers.html">管理申請</a>
      `;
    }
  }catch(e){
    console.warn("管理者狀態載入失敗", e);
  }
}

main();
</script>
</body>
</html>
