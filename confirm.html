<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>候補回覆</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="topbar">
  <div>
    <span class="eyebrow">Waitlist Reply</span>
    <h1>候補名額回覆</h1>
  </div>
</div>

<div id="content" class="confirm-card">載入中…</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="assets/main.js"></script>
<script>
const el = document.getElementById("content");

function renderQuestion(activity){
  el.innerHTML = `
    <p class="big">第 ${activity.id} 號活動</p>
    <p>「${activity.title}」目前已有名額釋出。</p>
    <p>是否要加入這個活動？</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" style="flex:1" id="cancelBtn">取消</button>
      <button class="btn btn-teal" style="flex:1" id="joinBtn">加入</button>
    </div>
  `;
  document.getElementById("joinBtn").addEventListener("click", ()=> decide(activity, "join"));
  document.getElementById("cancelBtn").addEventListener("click", ()=> decide(activity, "cancel"));
}

async function decide(activity, decision){
  el.innerHTML = `<p>處理中…</p>`;
  try{
    const res = await confirmWaitlistDecision(activity.id, decision);
    if(decision === "join"){
      el.innerHTML = `
        <p class="big">已為您加入活動！</p>
        <p>「${activity.title}」</p>
        ${res.groupUrl
          ? `<a class="btn btn-teal btn-block" style="margin-top:14px" href="${res.groupUrl}" target="_blank" rel="noopener">加入揪團群組 →</a>`
          : `<p class="join-note">主辦人尚未提供群組連結，請透過主辦人 LINE 聯繫。</p>`}
      `;
    }else{
      el.innerHTML = `
        <p class="big">已為您取消</p>
        <p>感謝回覆，祝您下次旅程順利！</p>
      `;
    }
  }catch(e){
    console.error(e);
    el.innerHTML = `<p>處理失敗，請稍後再試，或聯繫主辦人。</p>`;
  }
}

async function main(){
  const activityId = new URLSearchParams(location.search).get("activityId");
  if(!activityId){
    el.innerHTML = `<p>缺少活動編號</p>`;
    return;
  }
  try{
    await requireLogin();
    const activity = await getActivityById(activityId);
    if(!activity){
      el.innerHTML = `<p>找不到這個活動</p>`;
      return;
    }
    renderQuestion(activity);
  }catch(e){
    console.error(e);
    el.innerHTML = `<p>讀取失敗，請稍後再試。</p>`;
  }
}

main();
</script>
</body>
</html>
